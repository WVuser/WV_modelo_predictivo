name: Extracción Masiva HubSpot

on:
  workflow_dispatch: # Permite ejecución manual

jobs:
  run-extraction:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl hubspot-api-client

    - name: Ejecutar script de extracción
      env:
        HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      run: python main.py

    - name: Subir Excel generado como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: reporte-chile
        path: reporte_chile_completo_final.xlsx
        retention-days: 7
